<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="This is a practice form for learning web development.">
    <title>Document</title>
</head>

<body>
    <header>
        <h1>Please Fill Out This Form</h1>
    </header>
    <form action="/Practicing-web-development/experiments/" method="get">
        <label for="Pet">Pets:</label>
        <input type="text" name="Pet" id="Pet" placeholder="Enter your Pets" required>
        <br><br>
        <label for="Age">Pets Age:</label>
        <input type="number" name="Age" id="Age" min="0" max="30" value="1" placeholder="Enter the pet's age" required>
        <br><br>
        <label for="Pass">Password:</label>
        <input type="password" name="Pass" id="Pass" maxlength="20" minlength="4" placeholder="Enter your password"
            required>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>

</body>

</html>
